<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - Satisfactory Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-auth">
<div class="container">
    <h1>Регистрация</h1>
    <form action="/register" method="post">
        <label class="field"><span>Имя</span><input type="text" name="username" required></label>
        <label class="field"><span>Email</span><input type="email" name="email" required></label>
        <label class="field"><span>Пароль</span><input type="password" name="password" required></label>
        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
</body>
</html>
