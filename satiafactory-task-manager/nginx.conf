events {
    worker_connections 1024;
}

http {
    # Docker DNS: пересоздание контейнеров меняет IP — без resolve nginx кэширует старые адреса → 502
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream task_backend {
        zone task_backend 64k;
        server task-service-1:8082 resolve max_fails=2 fail_timeout=5s;
        server task-service-2:8082 resolve max_fails=2 fail_timeout=5s;
        server task-service-3:8082 resolve max_fails=2 fail_timeout=5s;
    }

    server {
        listen 8090;

        location / {
            proxy_pass http://task_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header X-Instance-ID;
            proxy_pass_header X-Cache;
        }
    }
}