global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: user-service
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: task-service
    static_configs:
      - targets:
          - task-service-1:8082
          - task-service-2:8082
          - task-service-3:8082

  - job_name: data-service
    static_configs:
      - targets: ["satisfactory-data-service:8083"]
